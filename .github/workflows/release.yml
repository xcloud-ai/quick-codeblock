name: Release Plugin

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: true

      - name: Generate artifact attestation for main.js
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: main.js

      - name: Generate artifact attestation for manifest.json
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: manifest.json

      - name: Generate artifact attestation for styles.css
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: styles.css
